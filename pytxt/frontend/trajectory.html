<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyTxT — Trajectory</title>
  <link rel="stylesheet" href="/css/theme.css?v=9">
</head>
<body>
  <main class="app-main">
    <div>
      <h1 class="page-title">Trajectory</h1>
      <p class="page-subtitle">First-turn positions, reference comparison, and shot-to-shot deviation.</p>
    </div>

    <section class="panel trajectory-panel">
      <div class="trajectory-header">
        <span id="trajectoryStatus">No acquisition yet</span>
        <span id="trajectoryDiffRms" class="diff-rms" hidden></span>
        <span id="trajectoryCounts" class="counts"></span>
      </div>
      <div class="trajectory-body">
        <div class="panel-grid panels-2" id="panelGrid">
          <div class="canvas-wrap">
            <div class="axis-label">X (mm)</div>
            <canvas id="canvasX" width="1000" height="280" aria-label="X position vs BPM index"></canvas>
          </div>
          <div class="canvas-wrap">
            <div class="axis-label">Y (mm)</div>
            <canvas id="canvasY" width="1000" height="280" aria-label="Y position vs BPM index"></canvas>
          </div>
          <div class="canvas-wrap diff-panel">
            <div class="axis-label">ΔX (mm)</div>
            <canvas id="canvasDX" width="1000" height="280" aria-label="X deviation from reference vs BPM index"></canvas>
          </div>
          <div class="canvas-wrap diff-panel">
            <div class="axis-label">ΔY (mm)</div>
            <canvas id="canvasDY" width="1000" height="280" aria-label="Y deviation from reference vs BPM index"></canvas>
          </div>
        </div>
        <aside class="reference-sidebar" id="referenceSidebar">
          <h2 class="sidebar-title">Reference</h2>
          <div class="ref-status" id="refStatus">No reference loaded</div>
          <div class="ref-buttons">
            <button type="button" id="promoteRefBtn">Promote current</button>
            <button type="button" id="loadRefBtn">Load…</button>
            <button type="button" id="saveRefBtn">Save current…</button>
            <button type="button" id="uploadRefBtn">Upload .mat</button>
            <button type="button" id="clearRefBtn">Clear</button>
          </div>
          <div class="ref-msg" id="refMsg" role="status"></div>
          <input type="file" id="uploadRefInput" accept=".mat" hidden>
        </aside>
      </div>
      <div class="actions">
        <button type="button" id="acquireButton" class="btn btn--primary">▶ Acquire</button>
        <span id="acquireMeta" class="meta"></span>
      </div>
    </section>

    <div class="ref-dialog" id="loadRefDialog" hidden>
      <div class="ref-dialog-box">
        <h3>Load reference from library</h3>
        <ul class="ref-list" id="refList"></ul>
        <div class="ref-dialog-actions">
          <button type="button" id="loadRefCancel">Cancel</button>
        </div>
      </div>
    </div>

    <div class="ref-dialog" id="saveRefDialog" hidden>
      <div class="ref-dialog-box">
        <h3>Save current trajectory as reference</h3>
        <label for="saveRefName">Filename</label>
        <input type="text" id="saveRefName" spellcheck="false" autocomplete="off">
        <div class="ref-dialog-actions">
          <button type="button" id="saveRefConfirm" class="primary">Save</button>
          <button type="button" id="saveRefCancel">Cancel</button>
        </div>
      </div>
    </div>
    <div id="trajectoryTooltip" class="trajectory-tooltip" hidden>
      <div class="tt-name" id="trajectoryTooltipName"></div>
      <div class="tt-values" id="trajectoryTooltipValues"></div>
    </div>
  </main>

  <script src="/js/shell.js"></script>
  <script src="/js/connection.js"></script>
  <script src="/js/trajectory.js"></script>
  <script src="/js/reference.js"></script>
</body>
</html>
