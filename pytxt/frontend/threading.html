<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyTxT — Threading</title>
  <link rel="stylesheet" href="/css/theme.css?v=3">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">PyTxT — Threading</h1>
    <nav class="app-nav">
      <a href="/">Ping</a>
      <a href="/trajectory.html">Trajectory</a>
      <a href="/threading.html" class="active">Threading</a>
    </nav>
    <div class="connection-status" id="connectionStatus" data-state="connecting">
      <span class="dot"></span>
      <span class="label" id="connectionStatusLabel">connecting…</span>
    </div>
  </header>

  <main class="app-main">
    <section class="state-panel" aria-labelledby="thread-heading">
      <h2 id="thread-heading" class="visually-hidden">First-turn threading</h2>

      <div class="state-grid">
        <div class="state-row"><span class="state-label">Status</span>     <span class="state-value" id="threadStatus">—</span></div>
        <div class="state-row"><span class="state-label">Running</span>    <span class="state-value" id="threadRunning">—</span></div>
        <div class="state-row"><span class="state-label">Iteration</span>  <span class="state-value" id="threadIteration">—</span></div>
        <div class="state-row"><span class="state-label">Orbit RMS</span>  <span class="state-value" id="threadRms">—</span></div>
      </div>

      <form class="thread-controls" id="threadControls">
        <label>Max steps <input type="number" id="maxSteps" value="6" min="1" max="100" step="1"></label>
        <label>Gain <input type="number" id="gain" value="0.5" min="0.05" max="1" step="0.05"></label>
        <label>Converge ≤ (mm) <input type="number" id="convRms" placeholder="(off)" min="0" step="0.01"></label>
        <label class="checkbox"><input type="checkbox" id="dryRun" checked> Dry run (no writes)</label>
        <label class="checkbox"><input type="checkbox" id="fireEachStep"> Fire each step</label>
      </form>

      <div class="actions">
        <button type="button" id="threadStartBtn" class="primary">▶ Start threading</button>
        <button type="button" id="threadStopBtn">■ Stop</button>
        <span id="threadMsg" class="meta" role="status"></span>
      </div>
    </section>

    <section class="log-panel" aria-labelledby="thread-log-heading">
      <h2 id="thread-log-heading" class="log-heading">Event log</h2>
      <ul class="log-list" id="eventLog" aria-live="polite"></ul>
    </section>
  </main>

  <script src="/js/connection.js"></script>
  <script src="/js/threading.js"></script>
</body>
</html>
