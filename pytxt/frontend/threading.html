<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyTxT — Threading</title>
  <link rel="stylesheet" href="/css/theme.css?v=8">
</head>
<body>
  <main class="app-main">
    <div>
      <h1 class="page-title">Threading</h1>
      <p class="page-subtitle">First-turn closed-loop correction (response-matrix inverse → corrector steps).</p>
    </div>

    <section class="panel" aria-labelledby="thread-heading">
      <div class="panel__head">
        <h2 id="thread-heading" class="panel__title">Loop state</h2>
      </div>

      <div class="readout-grid">
        <div class="readout"><span class="readout__label">Status</span>    <span class="readout__value" id="threadStatus">—</span></div>
        <div class="readout"><span class="readout__label">Running</span>   <span class="readout__value" id="threadRunning">—</span></div>
        <div class="readout"><span class="readout__label">Iteration</span> <span class="readout__value" id="threadIteration">—</span></div>
        <div class="readout"><span class="readout__label">Orbit RMS</span> <span class="readout__value" id="threadRms">—</span></div>
      </div>

      <form class="thread-controls" id="threadControls">
        <label>Max steps <input type="number" id="maxSteps" value="6" min="1" max="100" step="1"></label>
        <label>Gain <input type="number" id="gain" value="0.5" min="0.05" max="1" step="0.05"></label>
        <label>Converge ≤ (mm) <input type="number" id="convRms" placeholder="(off)" min="0" step="0.01"></label>
        <label class="checkbox"><input type="checkbox" id="dryRun" checked> Dry run (no writes)</label>
        <label class="checkbox"><input type="checkbox" id="fireEachStep"> Fire each step</label>
      </form>

      <div class="actions">
        <button type="button" id="threadStartBtn" class="btn btn--primary">▶ Start threading</button>
        <button type="button" id="threadStopBtn" class="btn">■ Stop</button>
        <span id="threadMsg" class="meta" role="status"></span>
      </div>
    </section>

    <section class="panel" aria-labelledby="thread-log-heading">
      <div class="panel__head">
        <h2 id="thread-log-heading" class="panel__title">Event log</h2>
      </div>
      <ul class="log-list" id="eventLog" aria-live="polite"></ul>
    </section>
  </main>

  <script src="/js/shell.js"></script>
  <script src="/js/connection.js"></script>
  <script src="/js/threading.js"></script>
</body>
</html>
