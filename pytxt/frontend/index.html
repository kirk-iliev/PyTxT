<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyTxT</title>
  <link rel="stylesheet" href="/css/theme.css?v=4">
</head>
<body>
  <main class="app-main">
    <div>
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">Turn-by-turn beam analysis for the ALS injection chain.</p>
    </div>

    <div class="card-grid card-grid--2">
      <section class="panel" aria-labelledby="state-heading">
        <div class="panel__head">
          <h2 id="state-heading" class="panel__title">System health</h2>
        </div>
        <div class="readout-grid">
          <div class="readout"><span class="readout__label">Version</span>   <span class="readout__value" id="version">—</span></div>
          <div class="readout"><span class="readout__label">Heartbeat</span> <span class="readout__value" id="heartbeat">—</span></div>
          <div class="readout"><span class="readout__label">Uptime</span>    <span class="readout__value" id="uptime">—</span></div>
          <div class="readout"><span class="readout__label">Last ping</span> <span class="readout__value" id="lastPingAt">—</span></div>
          <div class="readout"><span class="readout__label">Ping count</span><span class="readout__value" id="pingCount">—</span></div>
        </div>
        <div class="actions actions--right" style="margin-top: var(--space-4);">
          <button type="button" id="pingButton" class="btn btn--primary">Ping</button>
        </div>
      </section>

      <section class="panel" aria-labelledby="log-heading">
        <div class="panel__head">
          <h2 id="log-heading" class="panel__title">Event log</h2>
        </div>
        <ul class="log-list" id="eventLog" aria-live="polite"></ul>
      </section>
    </div>
  </main>

  <script src="/js/shell.js"></script>
  <script src="/js/connection.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
